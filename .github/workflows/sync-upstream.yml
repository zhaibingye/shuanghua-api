name: Sync upstream without workflows

on:
  workflow_dispatch:
    inputs:
      upstream_remote:
        description: 'Upstream repository URL'
        required: true
        default: 'https://github.com/QuantumNous/new-api.git'
        type: string
      upstream_branch:
        description: 'Upstream branch to merge'
        required: true
        default: 'main'
        type: string

permissions:
  contents: write

concurrency:
  group: sync-upstream-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    name: Sync upstream into current branch
    runs-on: ubuntu-latest

    steps:
      - name: Check out current branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure upstream remote
        run: |
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream "${{ inputs.upstream_remote }}"
          else
            git remote add upstream "${{ inputs.upstream_remote }}"
          fi

      - name: Sync upstream and preserve workflows
        run: bin/sync-upstream-without-workflows.sh upstream "${{ inputs.upstream_branch }}"

      - name: Commit and push merge
        run: |
          git status --short
          if git diff --quiet && git diff --cached --quiet; then
            echo "No upstream changes to commit."
            exit 0
          fi
          git commit -m "merge: sync upstream ${{ inputs.upstream_branch }}"
          git push origin HEAD:${{ github.ref_name }}
